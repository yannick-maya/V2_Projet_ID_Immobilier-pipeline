name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint syntax
        run: |
          python -m py_compile pipeline/ingestion.py
          python -m py_compile pipeline/cleaning_v2_spark.py
          python -m py_compile pipeline/modeling_mongodb.py
          python -m py_compile pipeline/indicators.py
          python -m py_compile pipeline/index.py
          python -m py_compile api/main.py

  deploy-render:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
